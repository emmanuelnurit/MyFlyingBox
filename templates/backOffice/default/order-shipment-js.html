{* MyFlyingBox - Order Shipment JavaScript (Thelia Native Style) *}
<script>
(function() {
    // XSS-safe HTML escaping helper
    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    // Vérifier que jQuery est disponible
    if (typeof jQuery === 'undefined' && typeof $ === 'undefined') {
        console.warn('MyFlyingBox: jQuery is required for shipment management. Some features may not work.');
        return;
    }

    // Utiliser jQuery ou $ selon disponibilité
    var $ = window.jQuery || window.$;

    $(function() {
    var orderId = {$order_id};
    var $container = $('.mfb-shipment-container[data-order-id="' + orderId + '"]');
    var $messages = $('#mfb-shipment-messages');

    // CSRF token — generated per-session in BackHook via direct session access
    var MFB_CSRF_TOKEN = '{$csrf_token|escape:"javascript"}';

    // URLs — token appended as ?_token= on POST endpoints
    var MFB_SHIPMENT_URLS = {
        create: '{url path="/admin/module/myflyingbox/shipment/create"}?_token={$csrf_token|escape:"javascript"}',
        book: '{url path="/admin/module/myflyingbox/shipment/book"}?_token={$csrf_token|escape:"javascript"}',
        cancel: '{url path="/admin/module/myflyingbox/shipment/cancel"}?_token={$csrf_token|escape:"javascript"}',
        status: '{url path="/admin/module/myflyingbox/shipment/status"}?_token={$csrf_token|escape:"javascript"}',
        syncTracking: '{url path="/admin/module/myflyingbox/shipment/sync-tracking"}?_token={$csrf_token|escape:"javascript"}',
        createReturn: '{url path="/admin/module/myflyingbox/shipment/create-return"}?_token={$csrf_token|escape:"javascript"}',
        tracking: '{url path="/admin/module/myflyingbox/shipment/tracking"}',
        downloadLabel: '{url path="/admin/module/myflyingbox/shipment/download-label"}'
    };

    // Translations for modals and statuses
    var MFB_ORDER_TRANSLATIONS = {
        cancel: '{intl l="Cancel" d="myflyingbox"|escape:"javascript"}',
        confirm: '{intl l="Confirm" d="myflyingbox"|escape:"javascript"}',
        // Status translations
        statuses: {
            'CREATED': '{intl l="Created" d="myflyingbox"|escape:"javascript"}',
            'BOOKED': '{intl l="Booked" d="myflyingbox"|escape:"javascript"}',
            'SHIPPED': '{intl l="Shipped" d="myflyingbox"|escape:"javascript"}',
            'DELIVERED': '{intl l="Delivered" d="myflyingbox"|escape:"javascript"}',
            'CANCELLED': '{intl l="Cancelled" d="myflyingbox"|escape:"javascript"}',
            'STATUS_CHANGE': '{intl l="Status change" d="myflyingbox"|escape:"javascript"}',
            'PENDING': '{intl l="Pending" d="myflyingbox"|escape:"javascript"}'
        }
    };

    // Helper to translate status
    function translateStatus(status) {
        return MFB_ORDER_TRANSLATIONS.statuses[status] || status;
    }

    // Standard BS3 confirm modal
    function showConfirmModal(title, message, onConfirm, options) {
        options = options || {};
        var confirmText = options.confirmText || MFB_ORDER_TRANSLATIONS.confirm;
        var confirmClass = options.confirmClass || 'btn-danger';

        var glyphiconMap = {
            warning: 'glyphicon-warning-sign',
            danger: 'glyphicon-exclamation-sign',
            info: 'glyphicon-info-sign'
        };
        var type = options.type || 'warning';
        var icon = glyphiconMap[type] || 'glyphicon-warning-sign';

        var modalId = 'mfb-confirm-modal-' + Date.now();
        var $modal = $('<div class="modal fade" id="' + modalId + '" tabindex="-1" role="dialog">' +
            '<div class="modal-dialog" role="document">' +
                '<div class="modal-content">' +
                    '<div class="modal-header">' +
                        '<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>' +
                        '<h4 class="modal-title"><span class="glyphicon ' + icon + '"></span> ' + escapeHtml(title) + '</h4>' +
                    '</div>' +
                    '<div class="modal-body">' +
                        '<p>' + escapeHtml(message) + '</p>' +
                    '</div>' +
                    '<div class="modal-footer">' +
                        '<button type="button" class="btn btn-default" data-dismiss="modal">' + MFB_ORDER_TRANSLATIONS.cancel + '</button>' +
                        '<button type="button" class="btn ' + confirmClass + '" id="mfb-confirm-action-btn">' + confirmText + '</button>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>');

        $('body').append($modal);

        $modal.find('#mfb-confirm-action-btn').on('click', function() {
            $modal.modal('hide');
            if (onConfirm) onConfirm();
        });

        $modal.on('hidden.bs.modal', function() {
            $modal.remove();
        });

        $modal.modal('show');
    }

    function showMessage(type, message) {
        $messages.html('<div class="alert alert-' + escapeHtml(type) + ' alert-dismissible">' +
            '<button type="button" class="close" data-dismiss="alert">&times;</button>' +
            message + '</div>');
    }

    function showLoading($btn) {
        $btn.prop('disabled', true).data('original-html', $btn.html());
        $btn.html('<span class="glyphicon glyphicon-refresh mfb-spin"></span> {intl l="Please wait..." d="myflyingbox"|escape:"javascript"}');
    }

    function hideLoading($btn) {
        $btn.prop('disabled', false).html($btn.data('original-html'));
    }

    // Create shipment form
    $('#mfb-create-shipment-form').on('submit', function(e) {
        e.preventDefault();

        var $form = $(this);
        var $btn = $form.find('button[type="submit"]');
        var serviceId = $('#mfb-service-select').val();
        var collectionDate = $form.find('input[name="collection_date"]').val();

        if (!serviceId) {
            showMessage('warning', '{intl l="Please select a carrier service" d="myflyingbox"|escape:"javascript"}');
            return;
        }

        showLoading($btn);

        $.ajax({
            url: MFB_SHIPMENT_URLS.create,
            method: 'POST',
            data: {
                order_id: orderId,
                service_id: serviceId,
                collection_date: collectionDate
            },
            dataType: 'json'
        })
        .done(function(response) {
            if (response.success) {
                showMessage('success', '{intl l="Shipment created successfully!" d="myflyingbox"|escape:"javascript"}');
                // Reload the tab content
                setTimeout(function() {
                    location.reload();
                }, 1000);
            } else {
                showMessage('danger', response.message || '{intl l="An error occurred" d="myflyingbox"|escape:"javascript"}');
            }
        })
        .fail(function(xhr) {
            var msg = '{intl l="An error occurred" d="myflyingbox"|escape:"javascript"}';
            if (xhr.responseJSON && xhr.responseJSON.message) {
                msg = xhr.responseJSON.message;
            }
            showMessage('danger', msg);
        })
        .always(function() {
            hideLoading($btn);
        });
    });

    // Book shipment
    $container.on('click', '.mfb-action-book', function() {
        var $btn = $(this);
        var shipmentId = $btn.data('shipment-id');

        showConfirmModal(
            '{intl l="Book Shipment" d="myflyingbox"|escape:"javascript"}',
            '{intl l="Are you sure you want to book this shipment? This action cannot be undone." d="myflyingbox"|escape:"javascript"}',
            function() {
                showLoading($btn);

                $.ajax({
                    url: MFB_SHIPMENT_URLS.book,
                    method: 'POST',
                    data: { shipment_id: shipmentId },
                    dataType: 'json'
                })
                .done(function(response) {
                    if (response.success) {
                        showMessage('success', '{intl l="Shipment booked successfully!" d="myflyingbox"|escape:"javascript"}');
                        setTimeout(function() {
                            location.reload();
                        }, 1000);
                    } else {
                        var errorHtml = response.message || '{intl l="Failed to book shipment" d="myflyingbox"|escape:"javascript"}';
                        if (response.error_detail && response.error_detail !== response.message) {
                            errorHtml += '<br><small class="text-muted">'
                                + '<span class="glyphicon glyphicon-console"></span> API : '
                                + $('<span>').text(response.error_detail).html()
                                + '</small>';
                        }
                        showMessage('danger', errorHtml);
                    }
                })
                .fail(function(xhr) {
                    var msg = '{intl l="An error occurred" d="myflyingbox"|escape:"javascript"}';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        msg = xhr.responseJSON.message;
                    }
                    showMessage('danger', msg);
                })
                .always(function() {
                    hideLoading($btn);
                });
            },
            {
                type: 'info',
                confirmText: '{intl l="Book" d="myflyingbox"|escape:"javascript"}',
                confirmClass: 'btn-primary'
            }
        );
    });

    // Download labels
    $container.on('click', '.mfb-action-labels', function() {
        var $btn = $(this);
        var shipmentId = $btn.data('shipment-id');

        showLoading($btn);

        // Use the proxy route to download the label PDF
        var downloadUrl = MFB_SHIPMENT_URLS.downloadLabel + '?shipment_id=' + shipmentId;
        window.open(downloadUrl, '_blank');

        hideLoading($btn);
    });

    // Mark as shipped
    $container.on('click', '.mfb-action-ship', function() {
        var $btn = $(this);
        var shipmentId = $btn.data('shipment-id');

        showConfirmModal(
            '{intl l="Mark as Shipped" d="myflyingbox"|escape:"javascript"}',
            '{intl l="Are you sure you want to mark this shipment as shipped?" d="myflyingbox"|escape:"javascript"}',
            function() {
                showLoading($btn);

                $.ajax({
                    url: MFB_SHIPMENT_URLS.status,
                    method: 'POST',
                    data: { shipment_id: shipmentId, status: 'shipped' },
                    dataType: 'json'
                })
                .done(function(response) {
                    if (response.success) {
                        showMessage('success', '{intl l="Shipment marked as shipped!" d="myflyingbox"|escape:"javascript"}');
                        setTimeout(function() {
                            location.reload();
                        }, 1000);
                    } else {
                        showMessage('danger', response.message || '{intl l="Failed to update shipment status" d="myflyingbox"|escape:"javascript"}');
                    }
                })
                .fail(function(xhr) {
                    var msg = '{intl l="An error occurred" d="myflyingbox"|escape:"javascript"}';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        msg = xhr.responseJSON.message;
                    }
                    showMessage('danger', msg);
                })
                .always(function() {
                    hideLoading($btn);
                });
            },
            {
                type: 'info',
                confirmText: '{intl l="Confirm" d="myflyingbox"|escape:"javascript"}',
                confirmClass: 'btn-success'
            }
        );
    });

    // Update tracking
    $container.on('click', '.mfb-action-tracking', function() {
        var $btn = $(this);
        var shipmentId = $btn.data('shipment-id');

        showLoading($btn);

        $.ajax({
            url: MFB_SHIPMENT_URLS.syncTracking,
            method: 'POST',
            data: { shipment_id: shipmentId },
            dataType: 'json'
        })
        .done(function(response) {
            if (response.success) {
                showMessage('success', '{intl l="Tracking updated successfully!" d="myflyingbox"|escape:"javascript"}');
                loadTrackingTimeline(shipmentId);
                if (response.status_changed) {
                    setTimeout(function() {
                        location.reload();
                    }, 1500);
                }
            } else {
                showMessage('info', response.message || '{intl l="No tracking updates available" d="myflyingbox"|escape:"javascript"}');
            }
        })
        .fail(function() {
            showMessage('danger', '{intl l="Failed to update tracking" d="myflyingbox"|escape:"javascript"}');
        })
        .always(function() {
            hideLoading($btn);
        });
    });

    // Cancel shipment
    $container.on('click', '.mfb-action-cancel', function() {
        var $btn = $(this);
        var shipmentId = $btn.data('shipment-id');

        showConfirmModal(
            '{intl l="Cancel Shipment" d="myflyingbox"|escape:"javascript"}',
            '{intl l="Are you sure you want to cancel this shipment?" d="myflyingbox"|escape:"javascript"}',
            function() {
                showLoading($btn);

                $.ajax({
                    url: MFB_SHIPMENT_URLS.cancel,
                    method: 'POST',
                    data: { shipment_id: shipmentId },
                    dataType: 'json'
                })
                .done(function(response) {
                    if (response.success) {
                        showMessage('success', '{intl l="Shipment cancelled" d="myflyingbox"|escape:"javascript"}');
                        setTimeout(function() {
                            location.reload();
                        }, 1000);
                    } else {
                        showMessage('danger', response.message || '{intl l="Failed to cancel shipment" d="myflyingbox"|escape:"javascript"}');
                    }
                })
                .fail(function() {
                    showMessage('danger', '{intl l="An error occurred" d="myflyingbox"|escape:"javascript"}');
                })
                .always(function() {
                    hideLoading($btn);
                });
            },
            {
                type: 'danger',
                confirmText: '{intl l="Cancel Shipment" d="myflyingbox"|escape:"javascript"}',
                confirmClass: 'btn-danger'
            }
        );
    });

    // Load tracking timeline on page load
    function loadTrackingTimeline(shipmentId) {
        var $timeline = $('#mfb-tracking-timeline');
        if ($timeline.length === 0) return;

        $.ajax({
            url: MFB_SHIPMENT_URLS.tracking,
            method: 'GET',
            data: { order_id: orderId },
            dataType: 'json'
        })
        .done(function(response) {
            if (response.success && response.tracking && response.tracking.length > 0) {
                var html = '';
                var hasContent = false;

                // Helper function to get glyphicon and label class based on event status
                function getEventStyle(status) {
                    var styles = {
                        'DELIVERED': { icon: 'glyphicon-ok', labelClass: 'label-success' },
                        'IN_TRANSIT': { icon: 'glyphicon-send', labelClass: 'label-primary' },
                        'SHIPPED': { icon: 'glyphicon-send', labelClass: 'label-primary' },
                        'BOOKED': { icon: 'glyphicon-bookmark', labelClass: 'label-info' },
                        'CREATED': { icon: 'glyphicon-plus', labelClass: 'label-default' },
                        'CANCELLED': { icon: 'glyphicon-remove', labelClass: 'label-danger' },
                        'STATUS_CHANGE': { icon: 'glyphicon-refresh', labelClass: 'label-warning' },
                        'OUT_FOR_DELIVERY': { icon: 'glyphicon-send', labelClass: 'label-primary' },
                        'PICKED_UP': { icon: 'glyphicon-log-out', labelClass: 'label-info' }
                    };
                    return styles[status] || { icon: 'glyphicon-record', labelClass: 'label-default' };
                }

                response.tracking.forEach(function(shipment) {
                    // Display shipment-level events first
                    if (shipment.events && shipment.events.length > 0) {
                        hasContent = true;
                        html += '<h5><span class="glyphicon glyphicon-send"></span> {intl l="Shipment History" d="myflyingbox"|escape:"javascript"}</h5>';
                        html += '<table class="table table-condensed">';
                        html += '<thead><tr><th style="width:120px;">{intl l="Status" d="myflyingbox"|escape:"javascript"}</th><th>{intl l="Details" d="myflyingbox"|escape:"javascript"}</th><th style="width:160px;">{intl l="Date" d="myflyingbox"|escape:"javascript"}</th></tr></thead>';
                        html += '<tbody>';
                        shipment.events.forEach(function(event) {
                            var style = getEventStyle(event.status);
                            html += '<tr>';
                            html += '<td><span class="label ' + style.labelClass + '"><span class="glyphicon ' + style.icon + '"></span> ' + escapeHtml(translateStatus(event.status || '')) + '</span></td>';
                            html += '<td>';
                            if (event.message) html += escapeHtml(event.message);
                            if (event.location) html += (event.message ? ' - ' : '') + '<small class="text-muted">' + escapeHtml(event.location) + '</small>';
                            html += '</td>';
                            html += '<td class="text-muted"><small>' + escapeHtml(event.date || '') + '</small></td>';
                            html += '</tr>';
                        });
                        html += '</tbody></table>';
                    }

                    // Display parcel tracking events
                    shipment.parcels.forEach(function(parcel) {
                        if (parcel.tracking_number) {
                            hasContent = true;
                            html += '<h5><span class="glyphicon glyphicon-barcode"></span> ' + escapeHtml(parcel.tracking_number);
                            if (parcel.tracking_url) {
                                var safeUrl = /^https?:\/\//.test(parcel.tracking_url) ? parcel.tracking_url : '#';
                                html += ' <a href="' + escapeHtml(safeUrl) + '" target="_blank" rel="noopener noreferrer" class="btn btn-xs btn-default"><span class="glyphicon glyphicon-new-window"></span></a>';
                            }
                            html += '</h5>';
                            if (parcel.events && parcel.events.length > 0) {
                                html += '<table class="table table-condensed">';
                                html += '<thead><tr><th style="width:120px;">{intl l="Status" d="myflyingbox"|escape:"javascript"}</th><th>{intl l="Details" d="myflyingbox"|escape:"javascript"}</th><th style="width:160px;">{intl l="Date" d="myflyingbox"|escape:"javascript"}</th></tr></thead>';
                                html += '<tbody>';
                                parcel.events.forEach(function(event) {
                                    var style = getEventStyle(event.status);
                                    html += '<tr>';
                                    html += '<td><span class="label ' + style.labelClass + '"><span class="glyphicon ' + style.icon + '"></span> ' + escapeHtml(translateStatus(event.status || '')) + '</span></td>';
                                    html += '<td>';
                                    if (event.message) html += escapeHtml(event.message);
                                    if (event.location) html += (event.message ? ' - ' : '') + '<small class="text-muted">' + escapeHtml(event.location) + '</small>';
                                    html += '</td>';
                                    html += '<td class="text-muted"><small>' + escapeHtml(event.date || '') + '</small></td>';
                                    html += '</tr>';
                                });
                                html += '</tbody></table>';
                            } else {
                                html += '<p class="text-muted"><span class="glyphicon glyphicon-info-sign"></span> {intl l="No tracking events yet" d="myflyingbox"|escape:"javascript"}</p>';
                            }
                        }
                    });
                });

                if (hasContent) {
                    $timeline.html(html);
                } else {
                    $timeline.html('<p class="text-muted"><span class="glyphicon glyphicon-info-sign"></span> {intl l="No history events yet" d="myflyingbox"|escape:"javascript"}</p>');
                }
            } else {
                $timeline.html('<p class="text-muted"><span class="glyphicon glyphicon-info-sign"></span> {intl l="No history events yet" d="myflyingbox"|escape:"javascript"}</p>');
            }
        })
        .fail(function(xhr, status, error) {
            console.error('MFB Tracking error:', status, error, xhr.responseText);
            $timeline.html('<p class="text-danger"><span class="glyphicon glyphicon-exclamation-sign"></span> {intl l="Failed to load history" d="myflyingbox"|escape:"javascript"}</p>');
        });
    }

    // Load tracking on page load if timeline exists
    if ($('#mfb-tracking-timeline').length > 0) {
        loadTrackingTimeline();
    }

    // Create return shipment
    $('#mfb-confirm-return').on('click', function() {
        var $btn = $(this);
        var $form = $('#mfb-create-return-form');
        var shipmentId = $form.find('input[name="shipment_id"]').val();
        var serviceId = $('#mfb-return-service-select').val();

        showLoading($btn);

        $.ajax({
            url: MFB_SHIPMENT_URLS.createReturn,
            method: 'POST',
            data: {
                shipment_id: shipmentId,
                service_id: serviceId || ''
            },
            dataType: 'json'
        })
        .done(function(response) {
            if (response.success) {
                $('#mfb-return-modal').modal('hide');
                showMessage('success', '{intl l="Return shipment created successfully!" d="myflyingbox"|escape:"javascript"}');
                setTimeout(function() {
                    location.reload();
                }, 1000);
            } else {
                showMessage('danger', response.message || "{intl l='Failed to create return shipment' d='myflyingbox'|escape:'javascript'}");
            }
        })
        .fail(function(xhr) {
            var msg = '{intl l="An error occurred" d="myflyingbox"|escape:"javascript"}';
            if (xhr.responseJSON && xhr.responseJSON.message) {
                msg = xhr.responseJSON.message;
            }
            showMessage('danger', msg);
        })
        .always(function() {
            hideLoading($btn);
        });
    });

    // Reset modal when closed
    $('#mfb-return-modal').on('hidden.bs.modal', function() {
        $('#mfb-return-service-select').val('');
    });
    });
})();
</script>

<style>
/* Minimal styles for MFB Shipment (Bootstrap 3 compatible) */
.mfb-shipment-container {
    margin-top: 15px;
}

/* Spinner animation for glyphicon-refresh */
@keyframes mfb-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.mfb-spin {
    display: inline-block;
    animation: mfb-spin 1s linear infinite;
}
</style>
